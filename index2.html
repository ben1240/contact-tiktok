<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection vers WhatsApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="loader">
        <h2>Redirection en cours...</h2>
        <p>Si vous n'êtes pas redirigé, cliquez sur le bouton ci-dessous :</p>
        <br>
        <a href="https://wa.me/22870492678?text=Bonjour,%20je%20viens%20de%20TikTok" class="btn-whatsapp">
            Ouvrir WhatsApp
        </a>
    </div>

        <script>
    // On attend que la page soit totalement chargée
    window.onload = function() {
        // Petite pause de 500ms pour laisser le temps au navigateur de comprendre
        setTimeout(function() {
            // On utilise "replace" pour éviter que l'utilisateur ne reste bloqué en boucle
            window.location.replace("https://api.whatsapp.com/send?phone=228XXXXXXX&text=Bonjour");
        }, 500);
    };
</script>

</body>
</html>
